<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Munro Tracker</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:#F6F6F6;color:#2d2d2d;height:100vh;display:flex;flex-direction:column;font-size:16px}
#header{background:#2d6a4f;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;z-index:1000;position:relative}
#header h1{font-size:1.15em;font-weight:600;color:#fff;letter-spacing:.3px;display:flex;align-items:center;gap:8px}
#stats{display:flex;gap:28px;align-items:center}
.stat{text-align:center}
.stat-num{font-size:1.4em;font-weight:600;color:#fff;line-height:1}
.stat-label{font-size:.72em;color:rgba(255,255,255,0.7);margin-top:2px}
#progress-bar-wrap{width:140px;background:rgba(255,255,255,0.25);border-radius:99px;height:6px;overflow:hidden}
#progress-bar{height:100%;background:#d8f3dc;border-radius:99px;transition:width .4s}
#pct-label{font-size:.72em;color:rgba(255,255,255,0.7);margin-top:3px;text-align:center}
#controls{background:#fff;padding:10px 16px;display:flex;gap:8px;align-items:center;border-bottom:1px solid #E8E8E8;z-index:1000;position:relative}
.search-wrap{position:relative;display:flex;align-items:center;flex:1}
.search-wrap svg{position:absolute;left:10px;pointer-events:none}
#search{background:#F6F6F6;border:1px solid #E8E8E8;color:#2d2d2d;padding:7px 14px 7px 32px;border-radius:99px;font-size:.82em;width:100%;font-family:inherit;outline:none;transition:border-color .2s}
#search:focus{border-color:#A6CEE3}
#search::placeholder{color:#bbb}
.filter-btn{background:#F6F6F6;border:1px solid #E8E8E8;color:#666;padding:6px 14px;border-radius:99px;cursor:pointer;font-size:.78em;font-family:inherit;font-weight:500;transition:all .2s;display:flex;align-items:center;gap:5px}
#main{display:flex;flex:1;overflow:hidden;position:relative}
#map{flex:1;min-height:0}
.leaflet-container{background:#A6CEE3 !important}
#sidebar{width:280px;background:#fff;border-left:1px solid #E8E8E8;display:flex;flex-direction:column;overflow:hidden;position:relative}
#sidebar-tabs{display:flex;border-bottom:1px solid #E8E8E8;flex-shrink:0}
.tab-btn{flex:1;padding:10px 6px;font-size:.75em;font-weight:500;font-family:inherit;background:#F6F6F6;border:none;border-bottom:2px solid transparent;cursor:pointer;color:#888;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:4px}
.tab-btn.active{background:#fff;color:#2d6a4f;border-bottom-color:#2d6a4f}
#sidebar-subfilters{padding:8px 12px;border-bottom:1px solid #E8E8E8;display:flex;gap:6px;flex-shrink:0;flex-wrap:wrap}
.sf-btn{background:#F6F6F6;border:1px solid #E8E8E8;color:#777;padding:4px 10px;border-radius:99px;cursor:pointer;font-size:.72em;font-family:inherit;font-weight:500;transition:all .2s}
.sf-btn.active{background:#2d6a4f;border-color:#2d6a4f;color:#fff}
#list-header{padding:10px 16px;background:#F6F6F6;font-size:.72em;color:#999;border-bottom:1px solid #E8E8E8;font-weight:500;letter-spacing:.3px;text-transform:uppercase;flex-shrink:0}
#list-content{flex:1;overflow-y:auto}
.list-item{padding:10px 16px;border-bottom:1px solid #F0F0F0;cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .15s}
.list-item:hover{background:#F6F6F6}
.list-item.done{opacity:.6}
.check-circle{width:18px;height:18px;border-radius:50%;border:1.5px solid #ccc;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;cursor:pointer}
.check-circle:hover{border-color:#2d6a4f;background:#f0faf4}
.item-name{font-size:.82em;font-weight:500;flex:1;color:#2d2d2d}
.item-sub{font-size:.7em;color:#aaa;display:block;margin-top:1px}
.bothy-stars{font-size:.72em;color:#f0b429;margin-top:2px}
.trip-card{padding:12px 16px;border-bottom:1px solid #F0F0F0;cursor:pointer;transition:background .15s}
.trip-card:hover{background:#F6F6F6}
.trip-card-name{font-size:.85em;font-weight:600;color:#2d2d2d;display:flex;justify-content:space-between;align-items:center}
.trip-card-meta{font-size:.72em;color:#aaa;margin-top:2px}
.trip-card-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.trip-tag{font-size:.68em;padding:2px 7px;border-radius:99px;font-weight:500}
.trip-tag.munro{background:#d8f3dc;color:#1b4332}
.trip-tag.bothy{background:#dde9f5;color:#1a3a5c}
#trip-editor{display:none;position:absolute;top:0;left:0;right:0;bottom:0;background:#fff;z-index:300;flex-direction:column;overflow:hidden}
#trip-editor.open{display:flex}
#trip-editor-header{background:#f0faf4;border-bottom:1px solid #E8E8E8;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#trip-editor-header span{font-size:.82em;font-weight:600;color:#2d6a4f}
#trip-editor-header button{background:none;border:1px solid #E8E8E8;color:#888;padding:4px 10px;border-radius:99px;cursor:pointer;font-size:.72em;font-family:inherit}
#trip-editor-body{flex:1;overflow-y:auto;padding:12px 16px}
.te-label{font-size:.75em;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.3px;margin-bottom:4px;margin-top:12px;display:block}
.te-label:first-child{margin-top:0}
.te-input{width:100%;border:1px solid #E8E8E8;border-radius:8px;padding:8px 10px;font-size:.82em;font-family:inherit;outline:none;color:#2d2d2d;background:#F6F6F6;transition:border-color .2s}
.te-input:focus{border-color:#A6CEE3;background:#fff}
.te-days{display:flex;align-items:center;gap:8px}
.te-days input{width:64px;text-align:center}
.te-days button{width:28px;height:28px;border:1px solid #E8E8E8;border-radius:99px;background:#F6F6F6;cursor:pointer;font-size:1em;color:#666;display:flex;align-items:center;justify-content:center}
#trip-select-mode-bar{background:#fff8e6;border:1px solid #FDBA74;border-radius:8px;padding:8px 10px;font-size:.76em;color:#7a4800;margin-top:4px;display:none;align-items:center;justify-content:space-between}
#trip-select-mode-bar button{background:#FDBA74;border:none;border-radius:99px;padding:3px 10px;font-size:.85em;cursor:pointer;font-family:inherit;font-weight:600;color:#7a4800}
.te-items{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;min-height:24px}
.te-item-tag{font-size:.72em;padding:3px 9px;border-radius:99px;display:flex;align-items:center;gap:4px;font-weight:500}
.te-item-tag.munro{background:#d8f3dc;color:#1b4332}
.te-item-tag.bothy{background:#dde9f5;color:#1a3a5c}
.te-item-tag button{background:none;border:none;cursor:pointer;font-size:.9em;color:inherit;opacity:.6;padding:0;line-height:1}
.te-day-box{border:1px solid #E8E8E8;border-radius:8px;margin-top:10px;overflow:hidden}
.te-day-label{font-size:.72em;font-weight:600;color:#2d6a4f;background:#f0faf4;padding:6px 10px;border-bottom:1px solid #E8E8E8;letter-spacing:.3px;text-transform:uppercase}
.te-day-items{display:flex;flex-wrap:wrap;gap:5px;padding:8px 10px;min-height:34px}
.te-day-add{background:none;border:none;border-top:1px dashed #e8e8e8;width:100%;padding:6px 10px;font-size:.72em;color:#aaa;cursor:pointer;font-family:inherit;text-align:left;transition:color .15s}
.te-day-add:hover{color:#2d6a4f}
.te-day-add.selecting{background:#f0faf4;color:#2d6a4f;border-top-color:#b7e4c7}
.te-night-section{border-top:1px solid #f0f0f0;padding:8px 10px}
.te-night-hdr{font-size:.68em;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.3px;margin-bottom:6px}
.te-night-tag{font-size:.72em;padding:3px 9px;border-radius:99px;background:#dde9f5;color:#1a3a5c;display:inline-flex;align-items:center;gap:4px;font-weight:500;margin-bottom:6px}
.te-night-tag.camp{background:#fff3cd;color:#7a5800}
.te-night-tag.other{background:#f0f0f0;color:#555}
.te-night-tag button{background:none;border:none;cursor:pointer;font-size:.9em;color:inherit;opacity:.6;padding:0;line-height:1}
.te-night-btns{display:flex;gap:5px;flex-wrap:wrap}
.te-night-btn{background:#F6F6F6;border:1px solid #E8E8E8;color:#666;padding:4px 10px;border-radius:99px;cursor:pointer;font-size:.72em;font-family:inherit;font-weight:500;transition:all .2s}
.te-night-btn.active{background:#dde9f5;border-color:#A6CEE3;color:#1a3a5c}
.te-night-btn.selecting{background:#f0faf4;border-color:#b7e4c7;color:#2d6a4f}
#trip-save-btn{margin-top:16px;background:#2d6a4f;color:#fff;border:none;padding:9px 0;border-radius:99px;cursor:pointer;font-size:.82em;font-weight:600;font-family:inherit;width:100%}
#trip-del-btn{margin-top:8px;background:none;border:1px solid #e74c3c;color:#e74c3c;padding:7px 0;border-radius:99px;cursor:pointer;font-size:.78em;font-weight:600;font-family:inherit;width:100%;display:none}
#trip-status-bar button{flex:1;padding:4px 0;border-radius:99px;font-size:.72em;font-weight:500;font-family:inherit;cursor:pointer}
#bothy-detail{display:none;position:absolute;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #E8E8E8;padding:14px 16px;z-index:200;box-shadow:0 -4px 16px rgba(0,0,0,0.08)}
#bothy-detail h3{font-size:.9em;font-weight:600;margin-bottom:10px;color:#2d2d2d;display:flex;justify-content:space-between;align-items:center}
#bothy-detail h3 button{background:none;border:none;color:#aaa;cursor:pointer;font-size:1.1em}
.star-rating{display:flex;gap:4px;margin-bottom:10px}
.star{font-size:1.3em;cursor:pointer;color:#ddd;transition:color .15s;line-height:1}
.star.filled,.star.hover{color:#f0b429}
#bothy-comment{width:100%;border:1px solid #E8E8E8;border-radius:8px;padding:8px 10px;font-size:.8em;font-family:inherit;resize:none;outline:none;color:#2d2d2d;background:#F6F6F6}
#bothy-save{margin-top:8px;background:#2d6a4f;color:#fff;border:none;padding:7px 16px;border-radius:99px;cursor:pointer;font-size:.78em;font-weight:600;font-family:inherit}
.leaflet-popup-content-wrapper{border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,0.12);padding:0;overflow:hidden;border:1px solid #E8E8E8}
.leaflet-popup-content{margin:0!important;min-width:190px}
.leaflet-popup-tip-container{margin-top:-1px}
.popup-tag{font-size:.72em;font-weight:600;letter-spacing:.5px;text-transform:uppercase;padding:6px 12px;display:flex;align-items:center;gap:5px}
.popup-tag.munro{background:#d8f3dc;color:#1b4332;border-bottom:1px solid #b7e4c7}
.popup-tag.bothy{background:#dde9f5;color:#1a3a5c;border-bottom:1px solid #A6CEE3}
.popup-inner{padding:12px 14px}
.popup-name{font-weight:600;font-size:.95em;margin-bottom:3px;color:#2d2d2d}
.popup-info{font-size:.8em;color:#888;margin-bottom:8px}
.popup-btn{background:#B7E4C7;color:#1a4a2e;border:none;padding:7px 12px;border-radius:99px;cursor:pointer;font-size:.8em;font-weight:600;font-family:inherit;width:100%;transition:background .2s}
.popup-btn.undo{background:#FDBA74;color:#7a3800}
#legend{position:absolute;bottom:24px;right:14px;background:rgba(255,255,255,0.95);padding:12px 14px;border-radius:10px;font-size:.72em;z-index:1000;border:1px solid #E8E8E8;line-height:2;pointer-events:none;box-shadow:0 2px 12px rgba(0,0,0,0.08);color:#555}
#legend .leg-title{font-size:.8em;font-weight:600;color:#999;letter-spacing:.4px;text-transform:uppercase;margin-bottom:4px}
.leg-row{display:flex;align-items:center;gap:7px}
#mobile-map-btn,#mobile-list-btn,#mobile-legend-btn{display:none}
#mobile-map-btn{position:absolute;top:10px;right:10px;z-index:1001;background:rgba(255,255,255,0.95);border:1px solid #E8E8E8;border-radius:8px;padding:6px 10px;cursor:pointer;font-size:.72em;font-weight:500;font-family:inherit;color:#2d2d2d;align-items:center;gap:5px;box-shadow:0 2px 8px rgba(0,0,0,0.12)}
#mobile-legend-btn{position:absolute;top:46px;right:10px;z-index:1001;background:rgba(255,255,255,0.95);border:1px solid #E8E8E8;border-radius:8px;padding:6px 10px;cursor:pointer;font-size:.72em;font-weight:500;font-family:inherit;color:#2d2d2d;align-items:center;gap:5px;box-shadow:0 2px 8px rgba(0,0,0,0.12)}
#mobile-select-done{display:none;position:absolute;bottom:20px;left:50%;transform:translateX(-50%);z-index:1001;background:#2d6a4f;color:#fff;border:none;border-radius:99px;padding:11px 24px;cursor:pointer;font-size:.82em;font-weight:600;font-family:inherit;box-shadow:0 3px 12px rgba(0,0,0,0.25);align-items:center;gap:6px;white-space:nowrap}
#mobile-list-btn{background:none;border:none;border-left:1px solid #E8E8E8;padding:0 12px;cursor:pointer;color:#888;align-items:center;justify-content:center;flex-shrink:0}
@media(max-width:768px){
  #header{padding:10px 16px;flex-wrap:nowrap;gap:10px}
  #progress-bar-wrap,#pct-label{display:none}
  #stats{gap:0}
  #search{font-size:16px}
  #main{flex-direction:column}
  #map{height:50vh;flex:none;width:100%}
  #sidebar{width:100%;border-left:none;border-top:1px solid #E8E8E8}
  #main.map-full #map{height:100%;flex:1}
  #main.map-full #sidebar{display:none}
  #main.list-full #map{display:none}
  #main.list-full #sidebar{flex:1;border-top:none}
  #mobile-map-btn,#mobile-list-btn,#mobile-legend-btn{display:flex}
  #legend{display:none}
  #legend.mobile-open{display:block;bottom:50px;right:8px;pointer-events:auto}
  #mobile-select-done.active{display:flex}
}
</style>
</head>
<body>
<div id="header">
  <h1>
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#d8f3dc" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3L1 21h22L15 3z"/><path d="M15 3l-4 8-3 4"/></svg>
    Munro Tracker
  </h1>
  <div id="stats">
    <div class="stat"><div class="stat-num" id="remaining-count">0</div><div class="stat-label">of 282 Munros</div></div>
    <div class="stat">
      <div id="progress-bar-wrap"><div id="progress-bar" style="width:0%"></div></div>
      <div id="pct-label">0% complete</div>
    </div>
  </div>
</div>
<div id="main">
  <div id="map">
    <button id="mobile-map-btn" onclick="mobileExpand('map')">
      <svg id="map-btn-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
      <span id="map-btn-label">Expand map</span>
    </button>
    <button id="mobile-legend-btn" onclick="toggleMobileLegend()">Legend</button>
    <button id="mobile-select-done" onclick="mobileDoneSelecting()">✓ Done — return to trip</button>
    <div id="legend">
      <div class="leg-title">Legend</div>
      <div class="leg-row"><svg width="12" height="12"><circle cx="6" cy="6" r="5" fill="#FDBA74" stroke="#c05c00" stroke-width="1"/></svg>Munro - to do</div>
      <div class="leg-row"><svg width="12" height="12"><circle cx="6" cy="6" r="5" fill="#B7E4C7" stroke="#2d6a4f" stroke-width="1"/></svg>Munro - done</div>
      <div class="leg-row"><svg width="12" height="12" viewBox="0 0 16 16" fill="#d0d0d0" stroke="#999" stroke-width="1.2"><polygon points="8,1 15,7 13,7 13,15 3,15 3,7 1,7"/></svg>Bothy - to visit</div>
      <div class="leg-row"><svg width="12" height="12" viewBox="0 0 16 16" fill="#A6CEE3" stroke="#3a7ca8" stroke-width="1.2"><polygon points="8,1 15,7 13,7 13,15 3,15 3,7 1,7"/></svg>Bothy - visited</div>
    </div>
  </div>
  <div id="sidebar">
    <div id="controls">
      <div class="search-wrap">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input id="search" type="text" placeholder="Search...">
      </div>
    </div>
    <div id="sidebar-tabs">
      <button class="tab-btn active" id="tab-munros">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M8 3L1 21h22L15 3z"/></svg>Munros
      </button>
      <button class="tab-btn" id="tab-bothies">
        <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"><path d="M1 7L8 1l7 6"/><path d="M3 7v8h10V7"/></svg>Bothies
      </button>
      <button class="tab-btn" id="tab-trips">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/></svg>Trips
      </button>
      <button id="mobile-list-btn" onclick="mobileExpand('list')" title="Expand list">
        <svg id="list-btn-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
      </button>
    </div>
    <div id="sidebar-subfilters"></div>
    <div id="list-header"></div>
    <div id="list-content"></div>
    <div id="trip-editor">
      <div id="trip-editor-header">
        <span id="trip-editor-title">New Trip</span>
        <button id="trip-cancel-btn">Cancel</button>
      </div>
      <div id="trip-editor-body">
        <label class="te-label">Trip Name</label>
        <input class="te-input" id="te-name" placeholder="e.g. Cairngorms Weekend">
        <label class="te-label">Description</label>
        <textarea class="te-input" id="te-desc" rows="2" placeholder="Notes, goals, conditions..."></textarea>
        <label class="te-label">Link (optional)</label>
        <input class="te-input" id="te-link" placeholder="https://...">
        <label class="te-label">Duration</label>
        <div class="te-days">
          <button id="days-minus">-</button>
          <input class="te-input" id="te-days" type="number" min="1" max="30" value="1">
          <button id="days-plus">+</button>
          <span style="font-size:.78em;color:#aaa">days</span>
        </div>
        <div id="trip-select-mode-bar">
          <span id="select-mode-text">Click markers on map to add/remove</span>
          <button id="select-done-btn">Done</button>
        </div>
        <div id="te-days-container"></div>
        <button id="trip-save-btn">Save Trip</button>
        <div id="trip-status-bar" style="display:flex;gap:6px;margin-top:8px;">
          <button id="btn-planned">Planned</button>
          <button id="btn-completed">Completed</button>
        </div>
        <button id="trip-del-btn">Delete This Trip</button>
      </div>
    </div>
    <div id="bothy-detail">
      <h3 id="bothy-detail-name">Bothy <button id="bothy-detail-close">x</button></h3>
      <div class="star-rating" id="star-rating">
        <span class="star" data-v="1">&#9733;</span>
        <span class="star" data-v="2">&#9733;</span>
        <span class="star" data-v="3">&#9733;</span>
        <span class="star" data-v="4">&#9733;</span>
        <span class="star" data-v="5">&#9733;</span>
      </div>
      <textarea id="bothy-comment" rows="2" placeholder="Leave a note..."></textarea>
      <button id="bothy-save">Save</button>
    </div>
  </div>
</div>
<script>
window.addEventListener('load', function() { initApp(); });

function initApp() {
  var map = L.map('map').setView([57.0, -4.5], 7);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: 'OpenStreetMap contributors', maxZoom: 19
  }).addTo(map);

  fetch('trails.geojson')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      L.geoJSON(data, {
        style: { color: '#ff3399', weight: 2, opacity: 0.8 },
        onEachFeature: function(feature, layer) {
          if (feature.properties && feature.properties.name) {
            layer.bindPopup(feature.properties.name);
          }
        }
      }).addTo(map);
    });

  function updateLabels(){
    var zoom=map.getZoom(), bounds=map.getBounds();
    munros.forEach(function(m){
      var inView=bounds.contains([m.lat,m.lng]);
      if(zoom>=LABEL_ZOOM&&inView){ if(!labelMarkers[m.id]){ labelMarkers[m.id]=makeLabel(m.name,m.lat,m.lng,false); labelMarkers[m.id].addTo(map); } }
      else{ if(labelMarkers[m.id]){ map.removeLayer(labelMarkers[m.id]); delete labelMarkers[m.id]; } }
    });
    bothyData.forEach(function(b,i){
      var inView=bounds.contains([b[1],b[2]]);
      if(zoom>=LABEL_ZOOM&&inView){ if(!bothyLabelMarkers[i]){ bothyLabelMarkers[i]=makeLabel(b[0],b[1],b[2],true); bothyLabelMarkers[i].addTo(map); } }

    });
  }

  function applyTripOverlay(mode){
    clearTripOverlays();
    setOpacity('all','1');
    munros.forEach(function(m){ var el=munroMarkers[m.id]&&munroMarkers[m.id].getElement(); if(el){ el.style.filter=''; el.style.outline=''; el.style.boxShadow=''; } });
    bothyData.forEach(function(_,i){ var el=bothyMarkers[i]&&bothyMarkers[i].mk.getElement(); if(el){ el.style.filter=''; el.style.outline=''; } });
    if(mode==='all'){
      var inM={},inB={};
      trips.forEach(function(t){ (t.items||[]).forEach(function(item){ if(item.type==='munro') inM[item.id]=true; else inB[item.id]=true; }); });
      munros.forEach(function(m){ var el=munroMarkers[m.id]&&munroMarkers[m.id].getElement(); if(el) el.style.opacity=inM[m.id]?'1':'0.07'; });
      bothyData.forEach(function(_,i){ var el=bothyMarkers[i]&&bothyMarkers[i].mk.getElement(); if(el) el.style.opacity=inB[i]?'1':'0.07'; });
      trips.forEach(function(t,tidx){
        if(!t.items||t.items.length===0) return;
        var color=TRIP_COLORS[tidx%TRIP_COLORS.length];
        t.items.forEach(function(item){
          var mk=item.type==='munro'?munroMarkers[item.id]:(bothyMarkers[item.id]?bothyMarkers[item.id].mk:null);
          if(!mk) return; var el=mk.getElement(); if(el) el.style.filter='drop-shadow(0 0 4px '+color+')';
        });
        var lats=[],lngs=[];
        (t.items||[]).forEach(function(item){
          var lat=null,lng=null;
          if(item.type==='munro'&&munros[item.id]){ lat=munros[item.id].lat; lng=munros[item.id].lng; }
          else if(item.type==='bothy'&&bothyData[item.id]){ lat=bothyData[item.id][1]; lng=bothyData[item.id][2]; }
          if(lat&&lng){ lats.push(lat); lngs.push(lng); }
        });
        if(!lats.length) return;
        var clat=lats.reduce(function(a,b){ return a+b; },0)/lats.length;
        var clng=lngs.reduce(function(a,b){ return a+b; },0)/lngs.length;
        var tname=t.name.length>20?t.name.substring(0,18)+'...':t.name;
        var num=tidx+1;
        var html='<div class="tlbl" style="display:inline-flex;align-items:center;gap:5px;background:'+color+';color:#fff;font-family:Inter,sans-serif;font-size:11px;font-weight:700;padding:4px 10px 4px 6px;border-radius:99px;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,0.35);cursor:pointer;"><span style="background:rgba(255,255,255,0.3);border-radius:50%;min-width:16px;height:16px;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;">'+num+'</span><span>'+tname+'</span></div>';
        var lbl=L.marker([clat,clng],{icon:L.divIcon({className:'trip-map-label',html:html,iconAnchor:[0,14],iconSize:null}),interactive:true,zIndexOffset:500}).addTo(map);
        (function(idx){ lbl.on('click',function(e){ L.DomEvent.stopPropagation(e); window.openEditTrip(idx); }); }(tidx));
        tripOverlayMarkers.push(lbl);
      });
      function updateSizes(){
        var z=map.getZoom();
        var fs=z>=10?'11px':z>=8?'9px':'7px';
        var pd=z>=10?'4px 10px 4px 6px':z>=8?'3px 8px 3px 5px':'2px 6px 2px 4px';

      }
      map.on('zoomend.tripLabels',updateSizes);
      updateSizes();
    }

        (function(idx){ rateBtn.onclick=function(e){ e.stopPropagation(); openBothyDetail(idx); }; }(i));

      lc.innerHTML='';

        lc.innerHTML='<div style="padding:24px 16px;text-align:center;color:#bbb;font-size:.82em;">No trips match this filter.</div>';

        card.innerHTML='<div class="trip-card-name"><span style="display:flex;align-items:center;gap:6px;"><span style="background:'+col+';color:#fff;font-size:.65em;font-weight:700;width:18px;height:18px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;">'+(idx+1)+'</span>'+t.name+statusTag+'</span></div><div class="trip-card-meta">'+t.days+' day'+(t.days!==1?'s':'')+descText+'</div><div class="trip-card-tags">'+mTag+bTag+'</div>';

            setTimeout(function(){ applyTripOverlay('all'); },50);
          };
          card.onclick=function(){ window.openEditTrip(i); };

        card.querySelector('.trip-card-name').appendChild(delBtn);
        lc.appendChild(card);
      });
    }
  }

  function switchTab(tab){
    activeTab=tab;
    clearFilters();
    if(tab!=='trips') closeTripEditor();

    // Munro popups & bothy hover: only active on their respective tabs
    munros.forEach(function(m){
      if(!munroMarkers[m.id]) return;
      if(tab==='trips') munroMarkers[m.id].unbindPopup();
      else munroMarkers[m.id].bindPopup(munroPopupHtml(m),{maxWidth:200});
    });

    bothyData.forEach(function(_,i){
      if(!bothyMarkers[i]) return;
      if(tab==='bothies'){
        // Restore popup and hover on bothies tab
        bothyMarkers[i].mk.bindPopup(bothyMarkers[i].makePopup(),{maxWidth:220});
        bindBothyHover(i);
      } else {
        // On munros or trips tab: remove hover; trips tab also removes popup
        unbindBothyHover(i);
        if(tab==='trips'){
          bothyMarkers[i].mk.unbindPopup();
        } else {
          // munros tab: keep popup for click, just no hover
          bothyMarkers[i].mk.bindPopup(bothyMarkers[i].makePopup(),{maxWidth:220});
        }
      }
    });

    document.getElementById('tab-munros').classList.toggle('active',tab==='munros');
    document.getElementById('tab-bothies').classList.toggle('active',tab==='bothies');
    document.getElementById('tab-trips').classList.toggle('active',tab==='trips');
    if(tab==='bothies') setTimeout(function(){ setOpacity('munros','0.1'); },50);
    if(tab==='trips') setTimeout(function(){ applyTripOverlay('all'); },50);
    renderSidebar();
  }

  document.getElementById('tab-munros').onclick=function(){ switchTab('munros'); };
  document.getElementById('tab-bothies').onclick=function(){ switchTab('bothies'); };
  document.getElementById('tab-trips').onclick=function(){ switchTab('trips'); };
  document.getElementById('search').oninput=function(e){ searchVal=e.target.value.toLowerCase().trim(); renderSidebar(); };

  function updateStats(){
    var done=munros.filter(function(m){ return m.done; }).length;
    document.getElementById('remaining-count').textContent=done;
    var pct=Math.round(done/282*100);
    document.getElementById('progress-bar').style.width=pct+'%';
    document.getElementById('pct-label').textContent=pct+'% complete';
  }

  // ── Bothy detail ──────────────────────────────────────────────────
  var activeBothyIdx=null;
  window.openBothyDetail=function(i){
    activeBothyIdx=i;
    var s=getBothy(i);
    document.getElementById('bothy-detail-name').childNodes[0].textContent=bothyData[i][0]+' ';
    document.getElementById('bothy-comment').value=s.comment||'';
    document.querySelectorAll('.star').forEach(function(st){ st.classList.toggle('filled',parseInt(st.dataset.v)<=s.rating); });
    document.getElementById('bothy-detail').style.display='block';
    map.closePopup();
  };
  document.getElementById('bothy-detail-close').onclick=function(){ document.getElementById('bothy-detail').style.display='none'; activeBothyIdx=null; };
  document.querySelectorAll('.star').forEach(function(star){
    star.onmouseenter=function(){ var v=parseInt(star.dataset.v); document.querySelectorAll('.star').forEach(function(s){ s.classList.toggle('hover',parseInt(s.dataset.v)<=v); }); };
    star.onmouseleave=function(){ document.querySelectorAll('.star').forEach(function(s){ s.classList.remove('hover'); }); };
    star.onclick=function(){ if(activeBothyIdx===null) return; getBothy(activeBothyIdx).rating=parseInt(star.dataset.v); document.querySelectorAll('.star').forEach(function(s){ s.classList.toggle('filled',parseInt(s.dataset.v)<=parseInt(star.dataset.v)); }); };
  });
  document.getElementById('bothy-save').onclick=function(){
    if(activeBothyIdx===null) return;
    getBothy(activeBothyIdx).comment=document.getElementById('bothy-comment').value.trim();
    saveBothies(); bothyMarkers[activeBothyIdx].mk.setPopupContent(bothyMarkers[activeBothyIdx].makePopup());
    renderSidebar(); document.getElementById('bothy-detail').style.display='none'; activeBothyIdx=null;
  };

  // ── Trip editor ───────────────────────────────────────────────────
  var editingTripIdx=null, selectMode=false, overnightSelectMode=false, pendingItems=[], pendingOvernights={}, currentStatus='planned', activeDayForSelect=1;

  function updateStatusButtons(){
    var p=document.getElementById('btn-planned');
    var c=document.getElementById('btn-completed');
    p.style.cssText='flex:1;padding:4px 0;border-radius:99px;font-size:.72em;font-weight:500;font-family:inherit;cursor:pointer;border:1px solid '+(currentStatus==='planned'?'#A6CEE3':'#E8E8E8')+';background:'+(currentStatus==='planned'?'#dde9f5':'#F6F6F6')+';color:'+(currentStatus==='planned'?'#1a3a5c':'#bbb')+';';
    c.style.cssText='flex:1;padding:4px 0;border-radius:99px;font-size:.72em;font-weight:500;font-family:inherit;cursor:pointer;border:1px solid '+(currentStatus==='completed'?'#B7E4C7':'#E8E8E8')+';background:'+(currentStatus==='completed'?'#d8f3dc':'#F6F6F6')+';color:'+(currentStatus==='completed'?'#1b4332':'#bbb')+';';
  }
  document.getElementById('btn-planned').onclick=function(){ currentStatus='planned'; updateStatusButtons(); };
  document.getElementById('btn-completed').onclick=function(){ currentStatus='completed'; updateStatusButtons(); };
  document.getElementById('trip-cancel-btn').onclick=function(){ closeTripEditor(); };
  document.getElementById('select-done-btn').onclick=function(){ if(overnightSelectMode) exitOvernightSelectMode(); else exitSelectMode(); };
  document.getElementById('trip-save-btn').onclick=function(){ saveTrip(); };
  document.getElementById('days-plus').onclick=function(){
    var el=document.getElementById('te-days'),v=parseInt(el.value)||1;
    if(v<30){ el.value=v+1; renderPendingItems(); }
  };
  document.getElementById('days-minus').onclick=function(){
    var el=document.getElementById('te-days'),v=parseInt(el.value)||1;
    if(v>1){ var newMax=v-1; pendingItems.forEach(function(item){ if((item.day||1)>newMax) item.day=newMax; }); el.value=newMax; renderPendingItems(); }
  };
  document.getElementById('trip-del-btn').onclick=function(){ deleteCurrentTrip(); };

  window.openNewTrip=function(){
    editingTripIdx=null; pendingItems=[]; pendingOvernights={};
    document.getElementById('te-name').value='';
    document.getElementById('te-desc').value='';
    document.getElementById('te-link').value='';
    document.getElementById('te-days').value=1;
    document.getElementById('trip-editor-title').textContent='New Trip';
    document.getElementById('trip-del-btn').style.display='none';
    currentStatus='planned'; updateStatusButtons();
    renderPendingItems();
    document.getElementById('trip-editor').classList.add('open');
    clearFilters(); setOpacity('all','1');
  };

  window.openEditTrip=function(idx){
    editingTripIdx=idx;
    var t=trips[idx];
    pendingItems=t.items?t.items.map(function(item){ return {type:item.type,id:item.id,name:item.name,day:item.day||1}; }):[];
    pendingOvernights=t.overnights?JSON.parse(JSON.stringify(t.overnights)):{};
    document.getElementById('te-name').value=t.name;
    document.getElementById('te-desc').value=t.desc||'';
    document.getElementById('te-link').value=t.link||'';
    document.getElementById('te-days').value=t.days||1;
    document.getElementById('trip-editor-title').textContent='Edit Trip';
    document.getElementById('trip-del-btn').style.display='block';
    currentStatus=t.status||'planned'; updateStatusButtons();
    renderPendingItems();
    document.getElementById('trip-editor').classList.add('open');
    clearFilters(); setOpacity('all','1');
    if(t.items&&t.items.length>0){
      var lats=[],lngs=[];
      t.items.forEach(function(item){
        var lat=null,lng=null;
        if(item.type==='munro'&&munros[item.id]){ lat=munros[item.id].lat; lng=munros[item.id].lng; }
        else if(item.type==='bothy'&&bothyData[item.id]){ lat=bothyData[item.id][1]; lng=bothyData[item.id][2]; }
        if(lat&&lng){ lats.push(lat); lngs.push(lng); }
      });
      if(lats.length>0) map.fitBounds(L.latLngBounds(lats.map(function(la,i){ return [la,lngs[i]]; })),{padding:[60,60]});
    }
    setTimeout(function(){ refreshTripHighlights(); },80);
  };

  function closeTripEditor(){
    exitSelectMode(); exitOvernightSelectMode();
    document.getElementById('trip-editor').classList.remove('open');
    if(activeTab==='trips') setTimeout(function(){ applyTripOverlay('all'); },50);
    else clearFilters();
  }
  window.closeTripEditor=closeTripEditor;

  function deleteCurrentTrip(){
    if(editingTripIdx===null) return;
    if(!confirm('Delete this trip?')) return;
    trips.splice(editingTripIdx,1); saveTrips();
    editingTripIdx=null; exitSelectMode();
    document.getElementById('trip-editor').classList.remove('open');
    renderSidebar();
    setTimeout(function(){ applyTripOverlay('all'); },50);
  }
  window.deleteCurrentTrip=deleteCurrentTrip;

  function renderPendingItems(){
    var numDays=parseInt(document.getElementById('te-days').value)||1;
    var c=document.getElementById('te-days-container'); c.innerHTML='';
    for(var d=1;d<=numDays;d++){
      var dayItems=pendingItems.filter(function(item){ return (item.day||1)===d; });
      var box=document.createElement('div'); box.className='te-day-box';
      var lbl=document.createElement('div'); lbl.className='te-day-label';
      lbl.textContent=numDays===1?'Munros & Bothies':'Day '+d;
      box.appendChild(lbl);
      var itemsEl=document.createElement('div'); itemsEl.className='te-day-items';
      dayItems.forEach(function(item){
        var realIdx=pendingItems.indexOf(item);
        var tag=document.createElement('div'); tag.className='te-item-tag '+item.type;
        tag.textContent=item.name;
        var x=document.createElement('button'); x.textContent='×';
        (function(idx){ x.onclick=function(){ pendingItems.splice(idx,1); renderPendingItems(); refreshTripHighlights(); }; }(realIdx));
        tag.appendChild(x); itemsEl.appendChild(tag);
      });
      box.appendChild(itemsEl);
      var isSelecting=selectMode&&activeDayForSelect===d;
      var addBtn=document.createElement('button');
      addBtn.className='te-day-add'+(isSelecting?' selecting':'');
      addBtn.textContent=isSelecting?'✓ Selecting for this day — tap Done when finished':'+ Add Munros';
      (function(day){ addBtn.onclick=function(){
        if(selectMode&&activeDayForSelect===day) exitSelectMode();
        else enterSelectMode(day);
      }; }(d));
      box.appendChild(addBtn);
      // Night section
      var nightSec=document.createElement('div'); nightSec.className='te-night-section';
      var nightHdr=document.createElement('div'); nightHdr.className='te-night-hdr'; nightHdr.textContent='Night';
      nightSec.appendChild(nightHdr);
      var ov=pendingOvernights[d];
      if(ov){
        var ntag=document.createElement('span');
        ntag.className='te-night-tag'+(ov.type==='camp'?' camp':ov.type==='other'?' other':'');
        ntag.textContent=ov.type==='bothy'?ov.name:ov.type==='camp'?'Camp':'Other';
        var nclr=document.createElement('button'); nclr.textContent='×';
        (function(day){ nclr.onclick=function(){ delete pendingOvernights[day]; renderPendingItems(); }; }(d));
        ntag.appendChild(nclr); nightSec.appendChild(ntag);
      }
      var nightBtns=document.createElement('div'); nightBtns.className='te-night-btns';
      var isOvSel=overnightSelectMode&&activeDayForSelect===d;
      var bBtn=document.createElement('button');
      bBtn.className='te-night-btn'+(isOvSel?' selecting':'');
      bBtn.textContent=isOvSel?'Click a bothy on map...':'Bothy';
      (function(day){ bBtn.onclick=function(){
        if(overnightSelectMode&&activeDayForSelect===day) exitOvernightSelectMode();
        else enterOvernightSelectMode(day);
      }; }(d));
      var cBtn=document.createElement('button');
      cBtn.className='te-night-btn'+(ov&&ov.type==='camp'?' active':'');
      cBtn.textContent='Camp';
      (function(day){ cBtn.onclick=function(){ pendingOvernights[day]={type:'camp'}; if(overnightSelectMode) exitOvernightSelectMode(); else renderPendingItems(); }; }(d));
      var oBtn=document.createElement('button');
      oBtn.className='te-night-btn'+(ov&&ov.type==='other'?' active':'');
      oBtn.textContent='Other';
      (function(day){ oBtn.onclick=function(){ pendingOvernights[day]={type:'other'}; if(overnightSelectMode) exitOvernightSelectMode(); else renderPendingItems(); }; }(d));
      nightBtns.appendChild(bBtn); nightBtns.appendChild(cBtn); nightBtns.appendChild(oBtn);
      nightSec.appendChild(nightBtns);
      box.appendChild(nightSec);
      c.appendChild(box);
    }
  }

  function enterSelectMode(day){
    if(overnightSelectMode){ overnightSelectMode=false; }
    activeDayForSelect=day||1;
    selectMode=true;
    var numDays=parseInt(document.getElementById('te-days').value)||1;
    document.getElementById('select-mode-text').textContent=numDays>1?'Adding to Day '+activeDayForSelect+' — click markers on map':'Click markers on map to add/remove';
    document.getElementById('trip-select-mode-bar').style.display='flex';
    map.getContainer().style.cursor='crosshair';
    if(window.innerWidth<=768){ mobilePushMapFull(); }
    renderPendingItems();
    map.closePopup();
    munros.forEach(function(m){
      if(!munroMarkers[m.id]) return;
      munroMarkers[m.id].off('click');
      (function(mid,mname){ munroMarkers[mid].on('click',function(e){ L.DomEvent.stopPropagation(e); addToTrip('munro',mid,mname); }); }(m.id,m.name));
    });
    bothyData.forEach(function(_,i){
      if(!bothyMarkers[i]) return;
      bothyMarkers[i].mk.off('click');
      unbindBothyHover(i); // ensure no hover in select mode
      (function(bi,bname){ bothyMarkers[bi].mk.on('click',function(e){ L.DomEvent.stopPropagation(e); addToTrip('bothy',bi,bname); }); }(i,bothyData[i][0]));
    });
  }
  window.enterSelectMode=enterSelectMode;

  function exitSelectMode(){
    selectMode=false;
    document.getElementById('trip-select-mode-bar').style.display='none';
    map.getContainer().style.cursor='';
    if(window.innerWidth<=768){ mobilePopMapFull(); }
    renderPendingItems();
    munros.forEach(function(m){
      if(!munroMarkers[m.id]) return;
      munroMarkers[m.id].off('click');
      munroMarkers[m.id].bindPopup(munroPopupHtml(m),{maxWidth:200});
    });
    bothyData.forEach(function(_,i){
      if(!bothyMarkers[i]) return;
      bothyMarkers[i].mk.off('click');
      bothyMarkers[i].mk.bindPopup(bothyMarkers[i].makePopup(),{maxWidth:220});
      // Only re-attach hover if we're on the bothies tab
      if(activeTab==='bothies') bindBothyHover(i);
    });
  }
  window.exitSelectMode=exitSelectMode;

  function enterOvernightSelectMode(day){
    if(selectMode) exitSelectMode();
    activeDayForSelect=day||1;
    overnightSelectMode=true;
    document.getElementById('select-mode-text').textContent='Click a bothy on the map for your night stop on Day '+activeDayForSelect;
    document.getElementById('trip-select-mode-bar').style.display='flex';
    map.getContainer().style.cursor='crosshair';
    if(window.innerWidth<=768){ mobilePushMapFull(); }
    renderPendingItems(); map.closePopup();
    bothyData.forEach(function(_,i){
      if(!bothyMarkers[i]) return;
      bothyMarkers[i].mk.off('click'); unbindBothyHover(i);
      (function(bi,bname){ bothyMarkers[bi].mk.on('click',function(e){
        L.DomEvent.stopPropagation(e);
        pendingOvernights[activeDayForSelect]={type:'bothy',id:bi,name:bname};
        exitOvernightSelectMode();
      }); }(i,bothyData[i][0]));
    });
  }

  function exitOvernightSelectMode(){
    if(!overnightSelectMode) return;
    overnightSelectMode=false;
    document.getElementById('trip-select-mode-bar').style.display='none';
    map.getContainer().style.cursor='';
    if(window.innerWidth<=768){ mobilePopMapFull(); }
    renderPendingItems();
    bothyData.forEach(function(_,i){
      if(!bothyMarkers[i]) return;
      bothyMarkers[i].mk.off('click');
      bothyMarkers[i].mk.bindPopup(bothyMarkers[i].makePopup(),{maxWidth:220});
      if(activeTab==='bothies') bindBothyHover(i);
    });
  }

  function addToTrip(type,id,name){
    var foundIdx=-1;
    for(var x=0;x<pendingItems.length;x++){ if(pendingItems[x].type===type&&pendingItems[x].id===id){ foundIdx=x; break; } }
    if(foundIdx>=0) pendingItems.splice(foundIdx,1);
    else pendingItems.push({type:type,id:id,name:name,day:activeDayForSelect});
    renderPendingItems(); refreshTripHighlights();
  }

  function saveTrip(){
    var name=document.getElementById('te-name').value.trim();
    if(!name){ document.getElementById('te-name').focus(); return; }
    var trip={name:name,desc:document.getElementById('te-desc').value.trim(),link:document.getElementById('te-link').value.trim(),days:parseInt(document.getElementById('te-days').value)||1,status:currentStatus,items:pendingItems.slice(),overnights:JSON.parse(JSON.stringify(pendingOvernights)),created:Date.now()};
    if(editingTripIdx!==null) trips[editingTripIdx]=trip; else trips.unshift(trip);
    saveTrips();
    document.getElementById('trip-editor').classList.remove('open');
    exitSelectMode(); renderSidebar();
    setTimeout(function(){ applyTripOverlay('all'); },50);
  }
  window.saveTrip=saveTrip;

  updateStats();
  renderSidebar();
  updateStatusButtons();

  var expandPath = 'M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3';
  var collapsePath = 'M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3';

  window.mobileExpand = function(which) {
    var main = document.getElementById('main');
    var wasMapFull = main.classList.contains('map-full');
    var wasListFull = main.classList.contains('list-full');
    main.classList.remove('map-full','list-full');
    if (which === 'map' && !wasMapFull) main.classList.add('map-full');
    if (which === 'list' && !wasListFull) main.classList.add('list-full');
    setTimeout(function(){ map.invalidateSize(); }, 50);
    var mapFull = main.classList.contains('map-full');
    var listFull = main.classList.contains('list-full');
    var mapLbl = document.getElementById('map-btn-label');
    var mapIco = document.getElementById('map-btn-icon');
    var listIco = document.getElementById('list-btn-icon');
    if (mapLbl) mapLbl.textContent = mapFull ? 'Show list' : 'Expand map';
    if (mapIco) mapIco.querySelector('path').setAttribute('d', mapFull ? collapsePath : expandPath);
    if (listIco) listIco.querySelector('path').setAttribute('d', listFull ? collapsePath : expandPath);
  };

  window.toggleMobileLegend = function() {
    document.getElementById('legend').classList.toggle('mobile-open');
  };

  function mobilePushMapFull(){
    var main=document.getElementById('main');
    main.classList.remove('list-full');
    main.classList.add('map-full');
    setTimeout(function(){ map.invalidateSize(); },50);
    var mapLbl=document.getElementById('map-btn-label');
    var mapIco=document.getElementById('map-btn-icon');
    if(mapLbl) mapLbl.textContent='Show list';
    if(mapIco) mapIco.querySelector('path').setAttribute('d',collapsePath);
    document.getElementById('mobile-select-done').classList.add('active');
  }

  function mobilePopMapFull(){
    var main=document.getElementById('main');
    main.classList.remove('map-full');
    setTimeout(function(){ map.invalidateSize(); },50);
    var mapLbl=document.getElementById('map-btn-label');
    var mapIco=document.getElementById('map-btn-icon');
    if(mapLbl) mapLbl.textContent='Expand map';
    if(mapIco) mapIco.querySelector('path').setAttribute('d',expandPath);
    document.getElementById('mobile-select-done').classList.remove('active');
  }

  window.mobileDoneSelecting = function(){
    if(overnightSelectMode) exitOvernightSelectMode();
    else exitSelectMode();
  };
}
</script>
</body>
</html>
